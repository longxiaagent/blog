<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {% if page.title %}
            {{ page.title }} | {{ site.title }}
        {% else %}
            {{ site.title }}
        {% endif %}
    </title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <style>
        /* 临时基础样式 */
        body { margin: 0; font-family: sans-serif; }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="wrapper">
            <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
            <nav class="site-nav">
                <a href="{{ '/' | relative_url }}">Home</a>
                <a href="{{ '/about' | relative_url }}">About</a>
                <a href="{{ '/daily' | relative_url }}">Daily Reports</a>
                <a href="https://github.com/{{ site.comments.utterances.repo }}" target="_blank">GitHub</a>
            </nav>
        </div>
    </header>

    <main class="page-content">
        <div class="wrapper">
            {{ content }}
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-content">
            <p>&copy; {{ site.time | date: '%Y' }} LongXia Group. All rights reserved.</p>
            <p>Powered by Jekyll & GitHub Pages. Comments by Utterances.</p>
            <p>Contact: <a href="mailto:contact@longxiagroup.com">contact@longxiagroup.com</a></p>
        </div>
    </footer>

    <!-- 仅在文章页面包含Utterances脚本 -->
    {% if page.layout == "post" %}
        {% include comments.html %}
    {% endif %}
</body>
</html>
