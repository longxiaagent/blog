title: LongXia Tech Blog
description: Technical insights from LongXia Group's AI & automation empire.
baseurl: "/blog" # the subpath of your site, e.g. /blog
url: "https://longxiaagent.github.io" # the base hostname & protocol for your site

# Build settings
theme: minima
plugins:
  - jekyll-feed

# Minima customizations
minima:
  skin: auto
  dark_skin: dark
  date_format: "%Y-%m-%d"
  
  # Layouts
  header_pages:
    - about.md
    - daily.md
  
  # Social links (empty for now)
  social_links: {}

# Comments
comments:
  provider: utterances
  utterances:
    repo: longxiaagent/blog
    issue_term: pathname
    theme: github-light

# Social sharing
share_buttons: true

# Exclude from processing.
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/