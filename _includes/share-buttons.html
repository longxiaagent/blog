{% if site.share_buttons %}
<div class="share-buttons">
  <a href="https://twitter.com/intent/tweet?url={{ page.url | absolute_url }}&text={{ page.title | url_encode }}" target="_blank" rel="noopener" class="twitter">🐦 Twitter</a>
  <a href="https://www.linkedin.com/sharing/share-offsite/?url={{ page.url | absolute_url }}" target="_blank" rel="noopener" class="linkedin">💼 LinkedIn</a>
  <a href="https://news.ycombinator.com/submitlink?u={{ page.url | absolute_url }}&t={{ page.title | url_encode }}" target="_blank" rel="noopener" class="hn">⚡ Hacker News</a>
</div>
{% endif %}
