{% if site.share_buttons %}
<div class="share-buttons">
  <a href="https://twitter.com/intent/tweet?url={{ site.url }}{{ page.url }}&text={{ page.title | url_encode }}" target="_blank" rel="noopener">🐦 Twitter</a>
  <a href="https://www.linkedin.com/sharing/share-offsite/?url={{ site.url }}{{ page.url }}" target="_blank" rel="noopener">💼 LinkedIn</a>
  <a href="https://news.ycombinator.com/submitlink?u={{ site.url }}{{ page.url }}&t={{ page.title | url_encode }}" target="_blank" rel="noopener">⚡ Hacker News</a>
</div>
{% endif %}
